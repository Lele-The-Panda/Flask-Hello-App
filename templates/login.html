<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">
</head>
<body>
<div class="page">
  <div class="card">
    <h1 class="title">Welcome back</h1>
    <p class="subtitle" style="margin-bottom:24px;">Log in to continue.</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-box">
          {% for m in messages %}<p>{{ m }}</p>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" class="form">
      <div>
        <label class="label">Username</label>
        <input class="input" name="username" placeholder="your username" required autocomplete="username">
      </div>
      <div>
        <label class="label">Password</label>
        <input class="input" type="password" name="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit">Login →</button>
    </form>

    <p class="meta">No account? <a href="/register">Register</a></p>
  </div>
</div>
</body>
</html>
